name = "erdos249257"
version = "0.4.0"
keywords = ["math", "erdos249", "erdos257", "lean4", "mathlib", "formalized-mathematics"]
defaultTargets = ["Erdos249257"]

[leanOptions]
pp.unicode.fun = true

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.1"

[[lean_lib]]
name = "Erdos249257"

# Downstream consumer example (examples/Examples.lean). Not a default target:
# CI builds it explicitly with `lake build Examples` after the library.
[[lean_lib]]
name = "Examples"
srcDir = "examples"
