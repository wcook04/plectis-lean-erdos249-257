name: Lean CI

# Two lanes: the Lean build (developer convenience; the kernel check is the
# proof authority) and the release-surface checks (claim registry, paper
# links, citation metadata, scope, licences).
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test bounded build planner
        run: python3 scripts/test_lean_fast_build.py
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: auto
          auto-config: false
          build: false
      - name: Memory-bounded Lean build
        # Drain independent Lucas modules without Lake's unbounded ready-set
        # fan-out; the final ordinary build remains the authority check.
        run: python3 scripts/lean_fast_build.py --jobs 4
      - name: Build downstream consumer example
        run: lake build Examples

  release-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # corpus descriptor resolves the pinned proof-source tag
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test immutable release source resolution
        run: python3 scripts/test_release_source_identity.py
      - name: Test scope source-identity boundary
        run: python3 scripts/test_scope_source_identity.py
      - name: Cross-surface release checks
        run: python3 scripts/check_release.py
      - name: Install metadata validators
        run: pip install cffconvert reuse
      - name: Validate CITATION.cff
        run: python3 scripts/check_metadata.py
      - name: REUSE licensing lint
        run: reuse lint
