name: Lean CI

# Two lanes: the Lean build (developer convenience; the kernel check is the
# proof authority) and the release-surface checks (claim registry, paper
# links, citation metadata, scope, licences). Feature branches run through the
# pull-request event only, avoiding a duplicate build for the same commit.
on:
  push:
    branches: [main]
  pull_request:
  # Merge commits created through the GitHub web UI do not always start a run,
  # which leaves the README badge reporting an older result than the branch.
  # Manual dispatch re-runs the same two jobs on any ref without a dummy commit.
  workflow_dispatch:

concurrency:
  group: lean-ci-${{ github.event.pull_request.number || github.ref }}
  # A newer PR head covers the complete base-to-head diff, so its predecessor
  # is redundant. Never cancel main runs: a later documentation-only push must
  # not cancel validation of an earlier direct Lean push.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # change gate compares the complete PR or push range
      - name: Detect Lean-affecting changes
        id: lean-inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="$BEFORE_SHA"
          head="$GITHUB_SHA"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            changed=true
          elif git diff --quiet "$base" "$head" -- \
            '*.lean' \
            lakefile.toml lakefile.lean lake-manifest.json lean-toolchain \
            scripts/lean_fast_build.py; then
            changed=false
          else
            changed=true
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "Lean-affecting changes: $changed ($base..$head)"
      - name: Test pinned proof-environment lock
        run: python3 scripts/test_dependency_lock_contract.py
      - name: Test bounded build planner
        run: python3 scripts/test_lean_fast_build.py
      - name: Restore project Lean cache
        if: steps.lean-inputs.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          # Unlike lean-action's internal cache step, this top-level action
          # saves after the later custom build has populated project OLeans.
          # Keep lean-action's key shape so existing main-branch caches seed
          # the first optimized run.
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}
      - uses: leanprover/lean-action@v1
        if: steps.lean-inputs.outputs.changed == 'true'
        with:
          use-mathlib-cache: auto
          use-github-cache: false
          auto-config: false
          build: false
      - name: Memory-bounded Lean build
        if: steps.lean-inputs.outputs.changed == 'true'
        # Drain independent Lucas modules without Lake's unbounded ready-set
        # fan-out. Lake's own trace hashes validate restored project outputs;
        # the final ordinary build remains the authority check.
        run: python3 scripts/lean_fast_build.py --jobs 4 --lake-staleness
      - name: Build downstream consumer example
        if: steps.lean-inputs.outputs.changed == 'true'
        run: lake build Examples
      - name: Record documentation-only build skip
        if: steps.lean-inputs.outputs.changed != 'true'
        run: echo "No Lean source or proof-environment input changed; compilation is unchanged."

  release-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # corpus descriptor resolves the pinned proof-source tag
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install metadata validators
        run: pip install cffconvert reuse

      - name: Check newcomer architecture guide
        run: |
          python3 scripts/check_architecture_guide.py
          python3 scripts/test_architecture_guide.py

      # Every check below is blocking, and every check below reports.  The
      # `!cancelled()` guard exists because release-surface failures are not
      # ordered by severity: a first-contact wording check runs before the
      # proof-trust guard, so a fail-fast job can report a missing README
      # sentence while silently never reaching a `native_decide` violation in
      # the checked source.  That is what happened between 2026-07-13 and
      # 2026-07-16.  Surfacing all failures at once weakens nothing; the job
      # still fails if any single check fails.
      - name: Cross-surface release checks (proof trust, claims, projections)
        if: ${{ !cancelled() }}
        run: python3 scripts/check_release.py
      - name: Test immutable release source resolution
        if: ${{ !cancelled() }}
        run: python3 scripts/test_release_source_identity.py
      - name: Test clean committed-snapshot release wrapper
        if: ${{ !cancelled() }}
        run: python3 scripts/test_check_release_ref.py
      - name: Test scope source-identity boundary
        if: ${{ !cancelled() }}
        run: python3 scripts/test_scope_source_identity.py
      - name: Test public-artifact boundary
        if: ${{ !cancelled() }}
        run: python3 scripts/test_public_artifact_boundary.py
      - name: Test supported root-import closure
        if: ${{ !cancelled() }}
        run: python3 scripts/test_root_import_closure.py
      - name: Test downstream example claim boundary
        if: ${{ !cancelled() }}
        run: python3 scripts/test_downstream_example_contract.py
      - name: Test adversarial methodology transitions
        if: ${{ !cancelled() }}
        run: python3 scripts/test_methodology_contract.py
      - name: Test publication artifact mutations
        if: ${{ !cancelled() }}
        run: python3 scripts/test_publication_artifact_contract.py
      - name: Test exact claim packet boundaries
        if: ${{ !cancelled() }}
        run: python3 scripts/test_claim_packet_boundaries.py
      - name: Test publication evidence time axis
        if: ${{ !cancelled() }}
        run: python3 scripts/test_publication_evidence_time_axis.py
      - name: Test ordinary-language status questions
        if: ${{ !cancelled() }}
        run: python3 scripts/test_status_question_search.py
      - name: Validate CITATION.cff
        if: ${{ !cancelled() }}
        run: python3 scripts/check_metadata.py
      - name: Test citation release identity
        if: ${{ !cancelled() }}
        run: python3 scripts/test_citation_identity_contract.py
      - name: REUSE licensing lint
        if: ${{ !cancelled() }}
        run: reuse lint
      - name: Test semantic licence map
        if: ${{ !cancelled() }}
        run: python3 scripts/test_license_map_contract.py
