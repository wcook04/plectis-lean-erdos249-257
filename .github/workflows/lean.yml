name: Lean CI

# Two lanes: the Lean build (developer convenience; the kernel check is the
# proof authority) and the release-surface checks (claim registry, paper
# links, citation metadata, scope, licences).
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: auto
          build: true
      - name: Build downstream consumer example
        run: lake build Examples

  release-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cross-surface release checks
        run: python3 scripts/check_release.py
      - name: Install metadata validators
        run: pip install cffconvert reuse
      - name: Validate CITATION.cff
        run: cffconvert --validate
      - name: REUSE licensing lint
        run: reuse lint
